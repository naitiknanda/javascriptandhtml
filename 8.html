<!DOCTYPE html>
<html>
<body style="font-family: 'Segoe UI'; font-weight: bold;">

<p>Naitik Nanda Projects Github @NaitikNanda ... Finding the largest number with help of the argument Objects</p>
<p id="result"></p>

<script>
function findMax() {
var i;
var max = 0;
for(i = 0; i < arguments.length; i++) {
if (arguments[i] > max) {
max = arguments[i];
}
}
return max;
}
document.getElementById("result").innerHTML = findMax(4, 5, 6);
</script>
</body>
</html>
