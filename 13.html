<!DOCTYPE html>
<html>
<body>
<h2>JavaScript Functions by Naitik Nanda Github @naitiknanda</h2>
<p>Do a calculation and then display the result by Naitik Nanda.</p>
<p id="demo"></p>
<script>
function add(a, b) {
  return a + b;
}
function average(a, b) {
  return add(a, b) / 2;
}
let result = average(10, 20);
document.getElementById("demo").innerHTML = result;
</script>
