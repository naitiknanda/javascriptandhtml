<!DOCTYPE html>

<body>
<h2>JavaScript While Loop design by Naitik nanda...!! Visit Github :- github.com/naitiknanda</h2>
<p id="naitiknanda"></p>
<script>
var text = "";
var i = 0;

while (i < 10) {
    text += "<br>The number is " + i;
    i++;
}
document.getElementById("naitiknanda").innerHTML = text;
</script>
