<!DOCTYPE html>
<html>
<body style="font-family: 'Segoe UI'; font-weight: bold;">

<p>Naitik Nanda Project After class | Sum of Arguments and Trigonometry</p>
<p id="result"></p>

<script>
function findSum() {
var i;
var sum = 0;
for(i = 0; i < arguments.length; i++) {
sum = sum + arguments[i];
}
return sum;
}

document.getElementById("result").innerHTML =
"Sum is " + findSum(4, 5, 6)
</script>
