<!DOCTYPE html>
<html>
    <body>
        <p>Click the button to get a time based greeting by naitik nanda</p>
        <button onclick="naitikfunction()">Try by clicking me!</button>
        <p id="hour"></p>
        <p id="greet"></p>
        <script>
            function naitikfunction() {
                var greeting;
                var time = new Date().getHours();
                if (time < 10) {
                    greeting = "Good Morning";
                }
                else if (time < 20) {
                    greeting = "Good afternoon";
                }
                else {
                    greeting = "Good Evening";
                }
                document.getElementById("hour").innerHTML = "Current hour is : "  + time;
                document.getElementById("greet").innerHTML = greeting;
            }
        </script>
    </body>
</html>
