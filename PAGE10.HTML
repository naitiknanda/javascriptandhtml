<!DOCTYPE html>
<html>
<body>
<h2>designed by naitik nanda github @naitiknanda</h2>
<p id="details"></p>
<script>
class Car {
  constructor(brand) {
    this.carname = brand;
  }

  present() {
    return 'I have a ' + this.carname;
  }
}
class Model extends Car {
  constructor(brand, mod) {
    super(brand);
    this.model = mod;
  }
  show() {
    return this.present() + ', model is a ' + this.model;
  }
}
let myCar = new Model("Volkswagen", "Ameo 2017 Petrol");
document.getElementById("details").innerHTML = myCar.show();
</script>
</body>
</html>
